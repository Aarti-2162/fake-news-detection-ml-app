<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 600px;">
    <h2 class="text-center mb-4">📰 Fake News Detection</h2>

    <form action="/predict" method="POST">
        <div class="mb-3">
            <textarea class="form-control" name="news" rows="5" placeholder="Enter news text here..." required></textarea>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg">Check News</button>
        </div>
    </form>

    {% if prediction %}
        <div class="alert alert-info text-center mt-4">
            <h4>{{ prediction }}</h4>
        </div>
    {% endif %}
</div>

</body>
</html>
